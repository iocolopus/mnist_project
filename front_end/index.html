<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="style.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MNIST</title>

</head>
<body>

    <header>
        <h1>MINIST project</h1>
        <p>Pruebas con diferentes modelos entrenados con el dataset de MNIST</p>
    </header>

    <div id="model_selection">
        <div class="column">
        <label for="model_select">Selecciona Modelo</label>
        <select id="model_select">
        </select>
        </div>
    </div>

    <div class="row_container">
        
        <div class="tools_container">
            <div class="tool active" id="pencil">
                <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px"><path d="M200-200h57l391-391-57-57-391 391v57Zm-80 80v-170l528-527q12-11 26.5-17t30.5-6q16 0 31 6t26 18l55 56q12 11 17.5 26t5.5 30q0 16-5.5 30.5T817-647L290-120H120Zm640-584-56-56 56 56Zm-141 85-28-29 57 57-29-28Z"/></svg>
            </div>
            <div class="tool" id="erase">
                <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px"><path d="M690-240h190v80H610l80-80Zm-500 80-85-85q-23-23-23.5-57t22.5-58l440-456q23-24 56.5-24t56.5 23l199 199q23 23 23 57t-23 57L520-160H190Zm296-80 314-322-198-198-442 456 64 64h262Zm-6-240Z"/></svg>
            </div>
        </div>

        <div class="column-container">
            <canvas id="canvas" width="500px" height="500px"></canvas>

            <div class="button-container">
                <button id="clean_button" class="button">
                    <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#e3e3e3"><path d="M280-120q-33 0-56.5-23.5T200-200v-520h-40v-80h200v-40h240v40h200v80h-40v520q0 33-23.5 56.5T680-120H280Zm400-600H280v520h400v-520ZM360-280h80v-360h-80v360Zm160 0h80v-360h-80v360ZM280-720v520-520Z"/></svg>
                    <p>Delete</p>
                </button>
                <button id="send_button" class="button">
                    <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#e3e3e3"><path d="M120-160v-640l760 320-760 320Zm80-120 474-200-474-200v140l240 60-240 60v140Zm0 0v-400 400Z"/></svg>
                    <p>Send</p>
                </button>
            </div>
        </div>

        <div class="results_container">
            <!--
            <div class="result">
                <p class="label">Digito 0: 43.0%</p>
                <div class="bar_container">
                    <div class="bar"></div>
                </div>
            </div>
            -->


        </div>
        
    
    </div>

    <p>PARRAFO DE DEBUG</p>
    <p id="debug">Me fumo porros como caballos</p>

    <script src="logic.js"></script>
</body>
</html>
