services:
  web:
    build:
      context: ..
      dockerfile: deployment/Dockerfile.front
    ports:
      - "8081:80"
    volumes:
      - ../front_end:/usr/share/nginx/html
    networks:
      - mi_network

  back:
    build:
      context: ..
      dockerfile: deployment/Dockerfile.back
    ports:
      - "8080:8000"
    volumes:
      - ../back_end:/usr/src/app
    networks:
      - mi_network

networks:
  mi_network:
    driver: bridge